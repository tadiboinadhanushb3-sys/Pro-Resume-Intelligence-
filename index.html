<!-- ============================================= -->
<!-- SECTION: LOADING SCREEN (used during app init) -->
<!-- ID: loading-section                            -->
<!-- ============================================= -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap');

.loading-container {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle at center, #1e3a8a 0%, #020617 100%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.magic-arc {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(255, 255, 255, 0.8);
    top: 15%;
    left: 50%;
    transform: translate(-50%, -10%);
    clip-path: polygon(0 0, 0 0, 0 50%, 0 50%);
    animation: drawArc 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    box-shadow: inset 0 15px 15px -15px rgba(255, 255, 255, 0.5);
}

@keyframes drawArc {
    0% { clip-path: polygon(100% 50%, 100% 50%, 100% 50%, 100% 50%); }
    100% { clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); }
}

.star-particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 20px 5px rgba(255,255,255,0.8);
    top: 15%;
    left: 50%;
    transform-origin: 300px 300px;
    animation: followArc 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    opacity: 0;
    z-index: 10;
}

@keyframes followArc {
    0% { transform: translate(-50%, -60%) rotate(90deg) translateX(-300px); opacity: 1; }
    90% { transform: translate(-50%, -60%) rotate(-90deg) translateX(-300px); opacity: 1; }
    100% { transform: translate(-50%, -60%) rotate(-90deg) translateX(-300px); opacity: 0; }
}

.disney-text-container {
    position: absolute; 
    top: 15%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    text-align: center;
    opacity: 0;
    animation: fadeInText 2s ease-in 1s forwards;
    z-index: 20;
}

.disney-title {
    font-family: 'Cinzel', serif;
    color: white;
    font-size: 3.5rem;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(99, 102, 241, 0.8);
    margin: 0;
    background: linear-gradient(180deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.disney-subtitle {
    font-family: 'Inter', sans-serif;
    color: #94a3b8;
    font-size: 1.2rem;
    letter-spacing: 8px;
    margin-top: 10px;
    text-transform: uppercase;
}

@keyframes fadeInText {
    0% { opacity: 0; transform: translate(-50%, -40%) scale(0.95); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.app-loading-text {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translateX(-50%);
    color: #64748b;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    letter-spacing: 4px;
    animation: pulseText 1.5s infinite ease-in-out;
    opacity: 0; 
}

@keyframes pulseText {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

.fade-in-delayed {
    animation: simpleFade 1s ease-in 2s forwards;
    opacity: 0;
}

@keyframes simpleFade {
    to { opacity: 1; }
}
</style>

<div class="loading-container">
    <audio id="magicSound" autoplay>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2c949c8119.mp3" type="audio/mpeg">
    </audio>
    <script>
        document.getElementById("magicSound").volume = 0.5;
    </script>

    <div class="star-particle"></div>
    <div class="magic-arc"></div>
    
    <div class="disney-text-container">
        <h1 class="disney-title">PRORESUME</h1>
        <div class="disney-subtitle">INTELLIGENCE</div>
    </div>
    
    <div class="fade-in-delayed">
        <div class="app-loading-text">LOADING APP...</div>
    </div>
</div>

<!-- ============================================= -->
<!-- SECTION: HEADER COMPONENT (dashboard header)  -->
<!-- ID: header-section                             -->
<!-- ============================================= -->
<!--HEADER_START-->
<div class="main-container">
    <div class="glass-header">
        <h1 class="hero-title">PRORESUME INTELLIGENCE</h1>
        <p class="subtitle">Next-Generation Resume Optimization Suite</p>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card" id="main-score">
            <div class="stat-value">{{SCORE}}<span style="font-size: 1.2rem; opacity: 0.6;">/100</span></div>
            <div class="stat-label">Competency Score</div>
        </div>
        <div class="stat-card" id="skill-count">
            <div class="stat-value">{{RATING_NUM}}<span style="font-size: 1.2rem; opacity: 0.6;">/10</span></div>
            <div class="stat-label">{{RATING_TEXT}} Rating</div>
        </div>
    </div>
</div>
<!--HEADER_END-->
